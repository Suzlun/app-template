name: CI

on:
  push:
    branches:
      - main
      - develop
  pull_request:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    # バックエンド統合テスト用の PostgreSQL サービス。
    # 統合テストは BACKEND_POSTGRES_TEST_OWNER_URL を使い、isolated なテスト DB を作成する。
    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Nix
        uses: cachix/install-nix-action@v31

      - name: Use devenv cache
        uses: cachix/cachix-action@v16
        with:
          name: devenv

      - name: Install devenv
        run: nix profile add nixpkgs#devenv

      - name: Check Nix shell tools
        run: |
          devenv shell -- node --version
          devenv shell -- pnpm --version
          devenv shell -- go version
          devenv shell -- openspec --version

      - name: Install dependencies
        run: devenv shell -- pnpm install --frozen-lockfile

      - name: Check formatting
        run: devenv shell -- pnpm format:check

      - name: Generate code
        run: devenv shell -- pnpm gen

      - name: Lint
        run: devenv shell -- pnpm lint

      - name: Type check
        run: devenv shell -- pnpm check

      - name: Unit tests (frontend + Go)
        run: devenv shell -- pnpm test:run
        env:
          BACKEND_POSTGRES_TEST_OWNER_URL: postgres://postgres:postgres@localhost:5432/postgres?sslmode=disable

      - name: Codegen drift check
        run: devenv shell -- pnpm check:codegen

      - name: Build
        run: devenv shell -- pnpm build
