# Admin Console local development configuration.
# The local bootstrap plaintext is: dev-admin-bootstrap-secret

[server]
port = 8081
origin = "http://admin.localhost:5176"
product_origin = "http://www.localhost:5173"

[cookie]
name = "www_template_admin_refresh"
domain = "admin.localhost"
path = "/"
secure = false
same_site = "Lax"

[auth]
jwt_secret = "dev-admin-jwt-secret-change-in-production"
rp_id = "admin.localhost"
rp_name = "Admin Console Dev"

[database]
admin_role = "admin_console_write"
url = "postgres://admin_console:admin_console@localhost:5432/app-template?sslmode=disable"

[valkey]
admin_url = "redis://localhost:6379/1"
product_url = "redis://localhost:6379/0"

[opensearch]
url = "http://localhost:9200"
admin_audit_replicas = 0
operator_audit_index_prefix = "admin-audit"
product_index_prefix = "app-template"

[observability]
otel_exporter_otlp_endpoint = "127.0.0.1:4317"
otel_exporter_otlp_traces_endpoint = "127.0.0.1:4317"
otel_exporter_otlp_logs_endpoint = "127.0.0.1:4317"
otel_service_name = "app-template-admin-api"
otel_resource_attributes = "service.namespace=app-template,deployment.environment=development"

[bootstrap]
enabled = true
secret_hash = "$2a$10$WU5jno/c6BoDS/rpiGJDpe5JVZIOiA0Hywl/7nS59ZHvas7qhDS7K"
expires_at = "2099-12-31T23:59:59Z"
